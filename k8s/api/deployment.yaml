apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ziri
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ziri-api
  template:
    metadata:
      labels:
        app: ziri-api
    spec:
      containers:
        - name: api
          image: ziri-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ziri-config
            - secretRef:
                name: ziri-secrets
          readinessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
