apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ziri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ziri-worker
  template:
    metadata:
      labels:
        app: ziri-worker
    spec:
      containers:
        - name: worker
          image: ziri-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: ziri-config
            - secretRef:
                name: ziri-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
