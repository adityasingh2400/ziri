apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ziri
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "ziri-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]
        scrape_interval: 10s

      - job_name: "ziri-worker"
        metrics_path: /metrics
        static_configs:
          - targets: ["worker:8001"]
        scrape_interval: 10s
